<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundraiser Spin the Wheel</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 20px; }
        h2 { color: #333; }
        #wheel-container { position: relative; display: inline-block; margin-top: 20px; }
        canvas { border: 5px solid #333; border-radius: 50%; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        #pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 30px solid #dc3545; z-index: 10;
        }
        button { margin-top: 25px; padding: 15px 30px; font-size: 20px; font-weight: bold; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
        #result { margin-top: 20px; font-size: 22px; font-weight: bold; color: #28a745; min-height: 30px; }
        #status-ghost { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Match Day Grand Prize Wheel!</h2>
    
    <div id="wheel-container">
        <div id="pointer"></div>
        <canvas id="wheel" width="400" height="400"></canvas>
    </div>
    
    <br>
    <button id="spin-btn" onclick="spinWheel()">SPIN THE WHEEL</button>
    <div id="result"></div>
    <div id="status-ghost" id="db-status">Setting up local wheel...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // 1. PLACE YOUR REAL FIREBASE DETAILS HERE
        const firebaseConfig = {
            apiKey: "AIzaSyCT9aPHko4gLd8Ho11H-ZqhLceBCsH3I_8",
  authDomain: "spin-the-wheel-dea67.firebaseapp.com",
  databaseURL: "https://spin-the-wheel-dea67-default-rtdb.firebaseio.com",
  projectId: "spin-the-wheel-dea67",
  storageBucket: "spin-the-wheel-dea67.firebasestorage.app",
  messagingSenderId: "339885622592",
  appId: "1:339885622592:web:b366d3d59d14e67321a6a5",
  measurementId: "G-WLKCECMVKN"
        };

        // 2. Default fallback slots so the wheel draws NO MATTER WHAT
        let slots = Array.from({length: 10}, (_, i) => ({
            number: i + 1,
            prize: "Prize " + (i + 1),
            available: true
        }));

        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        let isSpinning = false;

        // Draw instantly with backup values so screen isn't blank
        drawWheel();

        // 3. Try connecting to Firebase safely
        try {
            if (!firebaseConfig.apiKey.includes("YOUR_")) {
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);
                const docRef = doc(db, "wheelConfig", "prizes");

                onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        slots = docSnap.data().slots;
                        document.getElementById("db-status").innerText = "Connected to Live Prizes!";
                        drawWheel();
                    } else {
                        document.getElementById("db-status").innerText = "Connected, but 'wheelConfig/prizes' document not found in Firestore.";
                    }
                }, (error) => {
                    console.error("Firebase Snapshot Error:", error);
                    document.getElementById("db-status").innerText = "Database permission error. Check Firestore Rules.";
                });
            } else {
                document.getElementById("db-status").innerText = "Running in Demo Mode (Insert Firebase Keys to save progress live).";
            }
        } catch (e) {
            console.error("Firebase setup failed:", e);
            document.getElementById("db-status").innerText = "Firebase setup crashed. Check credentials.";
        }

        function drawWheel() {
            const numSegments = slots.length;
            const arc = (2 * Math.PI) / numSegments;

            // Clear previous drawings
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            slots.forEach((slot, i) => {
                const angle = i * arc;
                ctx.beginPath();
                // Alternates green and yellow, greys out if won
                ctx.fillStyle = slot.available ? (i % 2 === 0 ? "#28a745" : "#ffc107") : "#6c757d";
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 195, angle, angle + arc);
                ctx.lineTo(200, 200);
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#333";
                ctx.stroke();

                // Draw Section Number Text
                ctx.save();
                ctx.fillStyle = slot.available ? "#ffffff" : "#d1d1d1";
                ctx.font = "bold 20px Arial";
                ctx.translate(200, 200);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillText(slot.number, 160, 7);
                ctx.restore();
            });
        }

        window.spinWheel = async function() {
            if (isSpinning) return;
            
            const availableSlots = slots.filter(s => s.available);
            if (availableSlots.length === 0) {
                document.getElementById("result").innerText = "All prizes have been claimed!";
                return;
            }

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;

            const winningSlot = availableSlots[Math.floor(Math.random() * availableSlots.length)];
            const winningIndex = slots.findIndex(s => s.number === winningSlot.number);
            
            const numSegments = slots.length;
            const arc = 360 / numSegments;
            
            // Math to ensure the wheel visually matches the top arrow pointer pointer
            const targetDegrees = 270 - (winningIndex * arc) - (arc / 2);
            const extraSpins = 6 * 360; 
            const totalRotation = extraSpins + targetDegrees;

            const duration = 5000; // 5 second clean spin
            const startTime = performance.now();

            function animate(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 4); // Smooth deceleration
                
                const frameRotation = totalRotation * easeOut;
                canvas.style.transform = `rotate(${frameRotation}deg)`;

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    document.getElementById("result").innerText = `🎉 Number ${winningSlot.number} Won: ${winningSlot.prize}!`;
                    slots[winningIndex].available = false;
                    drawWheel();
                    
                    // Try to save to Firebase if configuration exists
                    if (!firebaseConfig.apiKey.includes("YOUR_")) {
                        try {
                            const db = getFirestore();
                            const docRef = doc(db, "wheelConfig", "prizes");
                            updateDoc(docRef, { slots: slots }).then(() => {
                                finalizeSpin();
                            }).catch(err => {
                                console.error("Could not update cloud database:", err);
                                finalizeSpin();
                            });
                        } catch(e) {
                            finalizeSpin();
                        }
                    } else {
                        finalizeSpin();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        function finalizeSpin() {
            isSpinning = false;
            const anyLeft = slots.some(s => s.available);
            if (!anyLeft) {
                document.getElementById("spin-btn").disabled = true;
                document.getElementById("result").innerText = "All out of prizes! Check back next match.";
            } else {
                document.getElementById("spin-btn").disabled = false;
            }
        }
    </script>
</body>
</html>
