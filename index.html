<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Live Spin Wheel</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e24;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 { margin-bottom: 10px; color: #f1c40f; }
        
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            max-width: 1200px;
            width: 100%;
            margin-top: 20px;
        }

        /* Wheel Canvas Styling */
        .wheel-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        /* The Ticker/Pointer arrow */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid #e74c3c;
            z-index: 10;
        }

        canvas {
            background: #2c3e50;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 8px solid #34495e;
            width: 100% !important;
            height: auto !important;
            box-sizing: border-box;
        }

        /* UI Panels */
        .panel {
            background: #2c3e50;
            padding: 20px;
            border-radius: 12px;
            min-width: 300px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            flex: 1;
        }

        /* Visibility control classes */
        .host-only, .admin-only { display: none; }
        
        button {
            background: #e67e22;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        button:hover { background: #d35400; }
        button:disabled { background: #7f8c8d; cursor: not-allowed; }
        
        .reset-btn {
            background: #e74c3c;
            margin-top: 10px;
            font-size: 16px;
            padding: 10px 20px;
        }
        .reset-btn:hover { background: #c0392b; }

        .prize-display {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: #27ae60;
            border-radius: 8px;
            animation: pulse 2s infinite;
            display: none;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        .slot-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .slot-row label { width: 40px; font-weight: bold; }
        .slot-row input {
            flex: 1;
            padding: 6px;
            background: #34495e;
            border: 1px solid #7f8c8d;
            color: white;
            border-radius: 4px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>🔮 Live Spin the Wheel</h1>
    <div id="status">Syncing game state...</div>

    <div class="prize-display" id="prizeDisplay"></div>

    <div class="container">
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="canvas" width="450" height="450"></canvas>
            
            <div class="host-only" id="spinControl">
                <button id="spinBtn" onclick="requestSpin()">🎰 SPIN THE WHEEL 🎰</button>
            </div>
        </div>

        <div class="panel admin-only" id="adminPanel">
            <h3>🎁 Master Setup Panel</h3>
            <div id="slotsSetup"></div>
            <button onclick="savePrizes()" style="font-size:16px; padding:10px;">💾 Save & Sync All Prizes</button>
            <button class="reset-btn" onclick="resetGame()">🔴 Reset Game (Clear History)</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCT9aPHko4gLd8Ho11H-ZqhLceBCsH3I_8",
            authDomain: "spin-the-wheel-dea67.firebaseapp.com",
            databaseURL: "https://spin-the-wheel-dea67-default-rtdb.firebaseio.com",
            projectId: "spin-the-wheel-dea67",
            storageBucket: "spin-the-wheel-dea67.firebasestorage.app",
            messagingSenderId: "339885622592",
            appId: "1:339885622592:web:b366d3d59d14e67321a6a5",
            measurementId: "G-WLKCECMVKN"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // State variables
        const numSlots = 20;
        let prizes = {};
        let usedSlots = [];
        let isSpinning = false;
        let currentRotation = 0;

        // Parse routing views from URL parameters (?view=admin or ?view=host)
        const urlParams = new URLSearchParams(window.location.search);
        const currentView = urlParams.get('view'); 
        
        const isAdmin = (currentView === 'admin');
        const isHost = (currentView === 'host' || currentView === 'admin'); // Admin automatically gets host controls too

        // UI Elements
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const prizeDisplay = document.getElementById("prizeDisplay");
        const spinBtn = document.getElementById("spinBtn");

        // Dynamically toggle views based on URLs
        if (isHost) {
            const spinEl = document.getElementById('spinControl');
            if (spinEl) spinEl.style.display = 'block';
        }
        if (isAdmin) {
            const adminEl = document.getElementById('adminPanel');
            if (adminEl) adminEl.style.display = 'block';
            setupAdminPanelUI();
        }

        // Dynamically build Admin Inputs
        function setupAdminPanelUI() {
            const container = document.getElementById("slotsSetup");
            container.innerHTML = ""; // Clear out to avoid duplicates
            for (let i = 1; i <= numSlots; i++) {
                container.innerHTML += `
                    <div class="slot-row">
                        <label>${i}:</label>
                        <input type="text" id="prize-input-${i}" placeholder="Enter prize or forfeit">
                    </div>`;
            }
        }

        // Admin functionality: Save Prizes to Firebase Realtime Database
        window.savePrizes = function() {
            let updatedPrizes = {};
            for (let i = 1; i <= numSlots; i++) {
                updatedPrizes[i] = document.getElementById(`prize-input-${i}`).value || `Slot ${i}`;
            }
            
            set(ref(db, 'game/prizes'), updatedPrizes).then(() => {
                set(ref(db, 'game/adminKey'), 'Bronson15');
                alert("Prizes saved and synchronized live!");
            }).catch(err => alert("Security Error: " + err.message));
        }

        // Admin functionality: Reset the entire game state
        window.resetGame = function() {
            if (confirm("Are you sure you want to reset the game? This will un-grey all slots and clear results.")) {
                set(ref(db, 'game/usedSlots'), null).then(() => {
                    update(ref(db, 'game/state'), {
                        spinning: false,
                        targetRotation: 0,
                        winningSlot: 0
                    });
                    prizeDisplay.style.display = 'none';
                    alert("Game has been completely reset!");
                }).catch(err => alert("Security Error: " + err.message));
            }
        }

        // Host / Admin functionality: Trigger a spin state in Firebase
        window.requestSpin = function() {
            if (isSpinning) return;
            
            let availableSlots = [];
            for(let i = 1; i <= numSlots; i++) {
                if(!usedSlots.includes(i)) availableSlots.push(i);
            }

            if(availableSlots.length === 0) {
                alert("All slots have been used!");
                return;
            }

            let pickedSlot = availableSlots[Math.floor(Math.random() * availableSlots.length)];
            let slotDegrees = 360 / numSlots;
            let targetAngle = 270 - ((pickedSlot - 0.5) * slotDegrees); 
            if (targetAngle < 0) targetAngle += 360;
            
            let finalRotation = currentRotation + 1800 + targetAngle - (currentRotation % 360);

            update(ref(db, 'game/state'), {
                targetRotation: finalRotation,
                winningSlot: pickedSlot,
                spinning: true,
                timestamp: Date.now()
            }).catch(err => alert("Security Error: " + err.message));
        }

        // LISTEN LIVE FOR DATA CHANGES (This runs across all views synchronously)
        onValue(ref(db, 'game'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            if (data.prizes) {
                prizes = data.prizes;
                if (isAdmin) {
                    for (let i = 1; i <= numSlots; i++) {
                        const inputField = document.getElementById(`prize-input-${i}`);
                        if(prizes[i] && inputField && !inputField.value) {
                            inputField.value = prizes[i];
                        }
                    }
                }
            }

            if (data.usedSlots) {
                usedSlots = Object.values(data.usedSlots);
            } else {
                usedSlots = [];
                if (!data.state || data.state.winningSlot === 0) {
                    prizeDisplay.style.display = 'none';
                }
            }

            if (data.state) {
                document.getElementById("status").innerText = "Game Connected Live.";
                
                if(!data.state.spinning && data.state.targetRotation === 0) {
                    currentRotation = 0;
                }

                if (data.state.spinning && !isSpinning) {
                    animateWheel(data.state.targetRotation, data.state.winningSlot);
                }
            }
            
            drawWheel();
        });

        // Wheel rendering logic
        function drawWheel() {
            const radius = canvas.width / 2;
            const sliceAngle = (2 * Math.PI) / numSlots;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(radius, radius);
            ctx.rotate((currentRotation * Math.PI) / 180);

            for (let i = 0; i < numSlots; i++) {
                let slotNum = i + 1;
                let isUsed = usedSlots.includes(slotNum);

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.closePath();

                if (isUsed) {
                    ctx.fillStyle = (i % 2 === 0) ? "#555" : "#444"; 
                } else {
                    ctx.fillStyle = (i % 2 === 0) ? "#9b59b6" : "#3498db"; 
                }
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = isUsed ? "#777" : "#fff";
                ctx.font = "bold 16px sans-serif";
                ctx.fillText(slotNum, radius - 20, 5);
                ctx.restore();
            }
            ctx.restore();
        }

        // Smooth Animation loop for the Canvas
        function animateWheel(targetRot, winningSlot) {
            isSpinning = true;
            if(isHost && spinBtn) spinBtn.disabled = true;
            prizeDisplay.style.display = 'none';

            let startRot = currentRotation;
            let duration = 5000; 
            let startTime = null;

            function easeOutQuad(t, b, c, d) {
                t /= d;
                return -c * t * (t - 2) + b;
            }

            function animationLoop(timestamp) {
                if (!startTime) startTime = timestamp;
                let elapsed = timestamp - startTime;

                currentRotation = easeOutQuad(elapsed, startRot, targetRot - startRot, duration);
                drawWheel();

                if (elapsed < duration) {
                    requestAnimationFrame(animationLoop);
                } else {
                    currentRotation = targetRot;
                    isSpinning = false;
                    drawWheel();

                    // Display Result everywhere
                    let prizeWon = prizes[winningSlot] || `Slot ${winningSlot}`;
                    prizeDisplay.innerText = `🎰 Result: Slot ${winningSlot} -> ${prizeWon}`;
                    prizeDisplay.style.display = 'block';

                    if (isHost && spinBtn) {
                        spinBtn.disabled = false;
                    }
                    if (isAdmin || (isHost && !isAdmin)) {
                        update(ref(db, 'game/state'), { spinning: false });
                        set(ref(db, `game/usedSlots/${winningSlot}`), winningSlot);
                    }
                }
            }
            requestAnimationFrame(animationLoop);
        }

        // Initial draw
        drawWheel();
    </script>
</body>
</html>
